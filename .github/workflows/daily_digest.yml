name: Daily Todoist Digest

on:
  schedule:
    - cron: "0 8 * * *"   # 11:00 UTC + ~40 min delay ≈ 9:00 AM Chile (UTC-3)
  workflow_dispatch:         # permite ejecutar manualmente desde la UI de Actions

jobs:
  send-digest:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Run digest script
        env:
          TODOIST_API_TOKEN:  ${{ secrets.TODOIST_API_TOKEN }}
          GMAIL_USER:         ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          TO_EMAIL:           ${{ secrets.TO_EMAIL }}
        run: python scripts/todoist_email.py
